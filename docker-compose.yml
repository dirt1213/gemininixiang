version: '3.8'

services:
  gemini-api:
    build: .
    container_name: gemini-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - API_KEY=sk-gemini
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      # 持久化配置文件，以便保存设置的Cookie和Token
      - ./config_data.json:/app/config_data.json
      # 持久化日志文件
      - ./api_logs.json:/app/api_logs.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
